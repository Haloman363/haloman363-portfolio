<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 186" width="340" height="186">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8f00"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
  </defs>
  <rect width="340" height="186" fill="url(#bg)"/>

  <!-- Shopping bag body -->
  <rect x="118" y="88" width="104" height="68" rx="9" fill="white" opacity="0.93"/>

  <!-- Bag handle (arch, no fill) -->
  <path d="M146 88 Q146 57 170 57 Q194 57 194 88"
        stroke="white" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.93"/>

  <!-- Orange circle badge on bag -->
  <circle cx="170" cy="120" r="18" fill="#e65100"/>

  <!-- W drawn as pure paths (5 points zigzag) -->
  <polyline points="157,110 162,132 170,118 178,132 183,110"
            stroke="white" stroke-width="3.5" fill="none"
            stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Gold coin top-left -->
  <circle cx="122" cy="60" r="11" fill="#ffd600" opacity="0.9"/>
  <!-- Dollar sign as two lines + S-curve -->
  <line x1="122" y1="53" x2="122" y2="67" stroke="#b35c00" stroke-width="1.8"/>
  <path d="M117 57 Q117 53 122 53 Q127 53 127 57 Q127 61 122 61 Q117 61 117 65 Q117 69 122 69 Q127 69 127 65"
        stroke="#b35c00" stroke-width="1.8" fill="none"/>

  <!-- Gold coin top-right (smaller) -->
  <circle cx="218" cy="52" r="8" fill="#ffd600" opacity="0.72"/>
  <line x1="218" y1="46" x2="218" y2="58" stroke="#b35c00" stroke-width="1.4"/>
  <path d="M214 49 Q214 46 218 46 Q222 46 222 49 Q222 52 218 52 Q214 52 214 55 Q214 58 218 58 Q222 58 222 55"
        stroke="#b35c00" stroke-width="1.4" fill="none"/>

  <!-- Label -->
  <text x="170" y="173" font-family="'Nunito',Arial,sans-serif" font-weight="800"
        font-size="15" fill="white" text-anchor="middle">Wii Shop Channel</text>
</svg>
